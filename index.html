<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Registration Form</h2>

        <form id="registerForm">
            <table>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name">
                    <p class="error" id="nameError"></p>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="email">
                    <p class="error" id="emailError"></p>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password">
                    <p class="error" id="passwordError"></p>
                </div>

                <button type="submit" id="submitBtn" disabled>Register</button>
            </table>
        </form>
    </div>

    <script src="script.js"></script>

</body>

</html>

<style>
    body {

        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        width: 300px;
        
    }

    h2 {
        text-align: center;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
    }

    input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .error {
        color: red;
        font-size: 12px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: green;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:disabled {
        background: gray;
    }
</style>
